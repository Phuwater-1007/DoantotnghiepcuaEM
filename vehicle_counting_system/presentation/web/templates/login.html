<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập | Hệ thống Giám sát Giao thông</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h1>Hệ thống Giám sát Giao thông</h1>
    <p class="page-subtitle">Đăng nhập để truy cập bảng điều khiển và trang giám sát.</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="form-grid">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label>Tên đăng nhập</label>
      <input type="text" name="username" placeholder="Nhập tên đăng nhập" required>
      <label>Mật khẩu</label>
      <input type="password" name="password" placeholder="Nhập mật khẩu" required>
      <button type="submit">Đăng nhập</button>
    </form>
    <div class="hint-box">
      <div>Phiên bản web này tập trung vào luồng phân tích video offline.</div>
      <div>Tài khoản mặc định vẫn do bạn quản lý riêng, không hiển thị công khai trên trang đăng nhập.</div>
    </div>
  </div>
</body>
</html>
